<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Kite Surfer Big Air</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#040a14;
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  user-select:none;-webkit-tap-highlight-color:transparent;}
#wrap{position:relative;width:100vw;height:100vh;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}

/* ── グラスモーフィズム ── */
.glass{
  background:rgba(4,12,28,0.62);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.10);border-radius:16px;
}

/* ── スコアパネル ── */
#hud-score{position:absolute;top:14px;left:14px;padding:8px 14px;min-width:110px;}
.lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-bottom:3px;}
#ui-score{font-size:20px;font-weight:900;color:#00FF88;line-height:1;
  text-shadow:0 0 16px rgba(0,255,136,0.5);}
#ui-best {font-size:11px;color:#FFD700;margin-top:3px;}
#ui-jumps{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;}

/* ── 最高高さログ ── */
#hud-log{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  padding:8px 14px;min-width:110px;text-align:center;}
#log-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,215,0,0.55);margin-bottom:4px;}
#log-list{font-size:11px;color:#FFD700;line-height:1.7;}

/* ── ウィンドパネル ── */
#hud-wind{position:absolute;top:14px;right:14px;padding:10px 14px;text-align:right;min-width:108px;}
#ui-wind {font-size:19px;font-weight:700;color:#88CCFF;}
#ui-speed{font-size:10px;color:rgba(255,255,255,0.32);margin-top:3px;}

/* ── 飛行中スタッツ ── */
#flight-stats{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  padding:8px 22px;text-align:center;
  display:none;pointer-events:none;
}
#flight-stats.show{display:block;}
.frow{display:flex;gap:20px;align-items:flex-end;}
.fstat{text-align:center;}
.fval{font-size:28px;font-weight:900;color:#fff;line-height:1;}
.fval.h{color:#FFD700;text-shadow:0 0 16px rgba(255,215,0,0.5);}
.fval.a{color:#88CCFF;}
.funit{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.38);
  text-transform:uppercase;margin-top:3px;}

/* ── パワーバー ── */
#power-wrap{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  width:min(220px,52vw);padding:8px 14px;
}
#power-lbl{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,0.32);
  text-align:center;margin-bottom:6px;text-transform:uppercase;}
#power-track{height:10px;border-radius:5px;background:rgba(255,255,255,0.08);overflow:hidden;}
#power-fill{height:100%;width:0%;border-radius:5px;transition:width 0.05s;
  background:linear-gradient(90deg,#00FF88,#FFD700,#FF4444);}
#power-fill.loop{background:linear-gradient(90deg,#00BFFF,#fff,#00BFFF);
  box-shadow:0 0 14px #00BFFF,0 0 28px rgba(0,191,255,0.4);}

/* ── 風窓警告 ── */
#wind-warn{
  position:absolute;bottom:58px;left:50%;transform:translateX(-50%);
  font-size:12px;font-weight:700;letter-spacing:1px;
  padding:5px 16px;border-radius:20px;white-space:nowrap;
  display:none;pointer-events:none;
}
#wind-warn.show{display:block;}
#wind-warn.warn   {background:rgba(255,215,0,0.18);color:#FFD700;border:1px solid rgba(255,215,0,0.4);}
#wind-warn.collapse{background:rgba(255,68,68,0.22);color:#FF4444;border:1px solid rgba(255,68,68,0.45);}

/* ── 結果カード ── */
#result-card{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-60%) scale(0.85);
  opacity:0;pointer-events:none;
  width:min(300px,86vw);padding:22px 18px;text-align:center;
}
#result-card.show{animation:cardIn .35s cubic-bezier(.34,1.56,.64,1) forwards;}
#result-card.hide{animation:cardOut .28s ease-in forwards;}
@keyframes cardIn {to{opacity:1;transform:translate(-50%,-55%) scale(1);}}
@keyframes cardOut{to{opacity:0;transform:translate(-50%,-65%) scale(0.85);}}
#card-title{font-size:26px;font-weight:900;letter-spacing:1px;margin-bottom:4px;}
#card-title.ok   {color:#00FF88;text-shadow:0 0 24px rgba(0,255,136,0.55);}
#card-title.crash{color:#FF4444;text-shadow:0 0 24px rgba(255,68,68,0.55);}
#card-reason{font-size:11px;color:#FF8888;margin-bottom:10px;min-height:14px;}
.cstats{display:flex;justify-content:space-around;margin:10px 0;}
.cs{text-align:center;}
.csv{font-size:26px;font-weight:900;color:#fff;}
.csv.h{color:#FFD700;}.csv.d{color:#00FF88;}.csv.t{color:#88CCFF;}
.csl{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,0.38);
  text-transform:uppercase;margin-top:3px;}
#card-div{height:1px;background:rgba(255,255,255,0.1);margin:10px 0;}
#card-tricks{font-size:12px;color:#FFD700;min-height:16px;}
#card-pts{font-size:20px;font-weight:700;color:rgba(255,255,255,0.8);margin-top:6px;}
#card-best{font-size:12px;color:#FFD700;margin-top:4px;font-weight:700;min-height:16px;}

/* ── タッチボタン (スマホ) ── */
#touch-r{
  position:absolute;bottom:18px;right:16px;
  display:none;flex-direction:column;gap:12px;align-items:center;
}
#touch-r.show{display:flex;}
.tbtn{
  width:68px;height:68px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.18);
  background:rgba(4,12,28,0.72);backdrop-filter:blur(10px);
  color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;
  transition:transform .1s,background .1s;touch-action:manipulation;
}
.tbtn:active{transform:scale(.90);background:rgba(255,255,255,0.14);}
.tbtn .ti{font-size:20px;line-height:1;}
#btn-jump{border-color:rgba(0,255,136,0.5);}
#btn-jump:active{background:rgba(0,255,136,0.18);}
#btn-loop{border-color:rgba(0,191,255,0.5);}
#btn-loop:active{background:rgba(0,191,255,0.18);}

/* ── トリックボタン (スマホ・空中) ── */
#touch-l{
  position:absolute;bottom:18px;left:16px;
  display:none;flex-direction:column;gap:10px;
}
#touch-l.show{display:flex;}
.trbtn{
  width:58px;height:58px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.14);
  background:rgba(4,12,28,0.65);backdrop-filter:blur(10px);
  color:rgba(255,255,255,0.65);font-size:9px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1px;transition:transform .1s;
  touch-action:manipulation;
}
.trbtn:active{transform:scale(.88);}
.trbtn .ti{font-size:16px;}

/* ── イントロヒント ── */
#hint{
  position:absolute;bottom:72px;left:50%;transform:translateX(-50%);
  font-size:12px;color:rgba(255,255,255,0.45);text-align:center;
  pointer-events:none;white-space:nowrap;transition:opacity .6s;
}
#hint.hide{opacity:0;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- スコア -->
  <div id="hud-score" class="glass">
    <div class="lbl">Score</div>
    <div id="ui-score">0</div>
    <div id="ui-best">BEST: 0</div>
    <div id="ui-jumps">JUMPS: 0</div>
  </div>

  <!-- ウィンド -->
  <div id="hud-wind" class="glass">
    <div class="lbl">Wind</div>
    <div id="ui-wind">-- m/s</div>
    <div id="ui-speed">SPD: --</div>
  </div>

  <!-- 高さログ -->
  <div id="hud-log" class="glass">
    <div id="log-title">▲ Best Heights</div>
    <div id="log-list">--</div>
  </div>

  <!-- 飛行中スタッツ -->
  <div id="flight-stats" class="glass">
    <div class="frow">
      <div class="fstat"><div id="fs-h" class="fval h">0</div><div class="funit">Height m</div></div>
      <div class="fstat"><div id="fs-a" class="fval a">0.0</div><div class="funit">Air s</div></div>
    </div>
  </div>

  <!-- パワーバー -->
  <div id="power-wrap" class="glass">
    <div id="power-lbl">Kite Power</div>
    <div id="power-track"><div id="power-fill"></div></div>
  </div>

  <!-- 風窓警告 -->
  <div id="wind-warn">⚠ KITE EDGE</div>

  <!-- 結果カード -->
  <div id="result-card" class="glass">
    <div id="card-title">LANDED!</div>
    <div id="card-reason"></div>
    <div class="cstats">
      <div class="cs"><div id="cs-h" class="csv h">0</div><div class="csl">Height m</div></div>
      <div class="cs"><div id="cs-d" class="csv d">0</div><div class="csl">Dist m</div></div>
      <div class="cs"><div id="cs-t" class="csv t">0</div><div class="csl">Air s</div></div>
    </div>
    <div id="card-div"></div>
    <div id="card-tricks"></div>
    <div id="card-pts">+0 pts</div>
    <div id="card-best"></div>
  </div>

  <!-- タッチボタン右 -->
  <div id="touch-r">
    <button id="btn-loop" class="tbtn"><span class="ti">🔄</span>LOOP</button>
    <button id="btn-jump" class="tbtn"><span class="ti">🚀</span>JUMP</button>
  </div>

  <!-- タッチボタン左(トリック) -->
  <div id="touch-l">
    <button id="btn-front" class="trbtn"><span class="ti">↻</span>FRONT</button>
    <button id="btn-back"  class="trbtn"><span class="ti">↺</span>BACK</button>
  </div>

  <!-- ヒント -->
  <div id="hint">← → でカイト操作 → SPACE でジャンプ</div>
</div>
<script>
// ============================================================
//  KITE SURFER BIG AIR  v5.0
//  スマホ・PC両対応 / グラスモーフィズムUI
// ============================================================

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── 画面サイズ（フルスクリーン）──
const W = canvas.width  = window.innerWidth;
const H = canvas.height = window.innerHeight;

const IS_MOBILE = ('ontouchstart' in window) || window.innerWidth < 700;

const WATER_Y         = Math.floor(H * 0.68);
const GRAVITY         = 0.28;
const PLAYER_SCREEN_X = IS_MOBILE ? Math.floor(W * 0.50) : Math.floor(W * 0.38);
const LINE_LEN        = Math.floor(Math.min(W, H) * 0.20);
const PX_TO_M         = 0.045;
const FPS             = 60;

const WIND_EDGE_WARN     = -22;
const WIND_EDGE_COLLAPSE = -10;
const CRASH_VY           = 9.5;
const TRICK_ROT_SPEED    = 11;

// ── 入力 ──
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── カメラ ──
const CAM = { x: 0, y: 0 };
function updateCamera() {
    CAM.x = P.x - PLAYER_SCREEN_X;
    const targetY = (P.onWater && !P.crashing) ? 0 : Math.min(0, P.y - H * 0.42);
    CAM.y += (targetY - CAM.y) * 0.065;
}
const sx = wx => wx - CAM.x;
const sy = wy => wy - CAM.y;

// ── ゲーム変数 ──
let score = 0, best = 0, jumpCount = 0, frame = 0;
let heightLog = []; // 最高高さログ (上位5件)
let resultCard = null;

// ── プレイヤー ──
const P = {
    x: W * 0.8, y: WATER_Y,
    vx: 5, vy: 0,
    onWater: true,
    airTime: 0, peakH: 0, jumpX: 0,
    dir: 1,
    trickScore: 0, tricks: new Set(),
    landCd: 0,
    rot: 0,
    trickRot: 0,
    crashRot: 0,
    loopDone: false, spinDone: false,
    comboWindow: 0, floatFrames: 0, boostVx: 0,
    crashing: false, crashTimer: 0,
};

// ── カイト ──
const K = {
    angle: -55, targetAngle: -55, prevAngle: -55, prevPrevAngle: -55,
    power: 0,
    swingPower: 0, swingFlash: 0,
    x: 0, y: 0,
    looping: false, loopTimer: 0, loopBase: -90,
    edgeState: 'ok', shakeAmt: 0,
};

const WIND = { base: 8.5 };

// ── トリック定義 ──
const TRICKS = [
    { code:'KeyA', name:'Grab',      pts: 30, col:'#FFD700', rotDir: 0 },
    { code:'KeyS', name:'FrontRoll', pts: 50, col:'#00CFFF', rotDir:+1 },
    { code:'KeyD', name:'BackRoll',  pts: 70, col:'#FF6B6B', rotDir:-1 },
];

let ptcls = [], msgs = [];

// ── 波 ──
const WAVES = Array.from({length:22},()=>({
    worldX: Math.random()*W*2,
    amp: 7+Math.random()*14, len: 65+Math.random()*90,
    spd: 0.9+Math.random()*1.8, ph: Math.random()*Math.PI*2,
}));

// ============================================================
//  タッチ操作
// ============================================================
if (IS_MOBILE) {
    document.getElementById('touch-r').classList.add('show');
    document.getElementById('hint').textContent = 'タッチでカイト操作 → JUMP でジャンプ';

    // カイト操作: 画面タッチ → プレイヤーからの角度
    canvas.addEventListener('touchstart', handleKiteTouch, {passive:false});
    canvas.addEventListener('touchmove',  handleKiteTouch, {passive:false});

    function handleKiteTouch(e) {
        e.preventDefault();
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const tx = (t.clientX - rect.left)  * (W / rect.width);
        const ty = (t.clientY - rect.top)   * (H / rect.height);
        // プレイヤーのスクリーン座標
        const psx = PLAYER_SCREEN_X;
        const psy = sy(P.y);
        // ボタンエリア（下部20%）は無視
        if (ty > H * 0.80) return;
        const angle = Math.atan2(ty - psy, tx - psx) * 180 / Math.PI;
        // 有効範囲: 上半球 (-176〜-4)
        if (angle > -4 && angle < 0) return;
        if (angle >= 0) return; // 下半分は無視
        K.targetAngle = Math.max(-176, Math.min(-4, angle));
    }

    // JUMP ボタン
    document.getElementById('btn-jump').addEventListener('touchstart', e => {
        e.preventDefault(); keys['Space'] = true;
    }, {passive:false});
    document.getElementById('btn-jump').addEventListener('touchend', e => {
        e.preventDefault(); keys['Space'] = false;
    }, {passive:false});

    // LOOP ボタン
    document.getElementById('btn-loop').addEventListener('touchstart', e => {
        e.preventDefault(); keys['KeyQ'] = true;
    }, {passive:false});
    document.getElementById('btn-loop').addEventListener('touchend', e => {
        e.preventDefault(); keys['KeyQ'] = false;
    }, {passive:false});

    // FrontRoll ボタン
    document.getElementById('btn-front').addEventListener('touchstart', e => {
        e.preventDefault(); keys['KeyS'] = true;
    }, {passive:false});
    document.getElementById('btn-front').addEventListener('touchend', e => {
        e.preventDefault(); keys['KeyS'] = false;
    }, {passive:false});

    // BackRoll ボタン
    document.getElementById('btn-back').addEventListener('touchstart', e => {
        e.preventDefault(); keys['KeyD'] = true;
    }, {passive:false});
    document.getElementById('btn-back').addEventListener('touchend', e => {
        e.preventDefault(); keys['KeyD'] = false;
    }, {passive:false});
}

// ============================================================
//  UPDATE
// ============================================================
function update() {
    frame++;
    const wind = WIND.base + Math.sin(frame * 0.009) * 1.5;

    if (P.crashing) {
        updateCrash();
    } else {
        updateKite(wind);
        updatePlayer();
    }
    updateCamera();

    WAVES.forEach(w => {
        w.worldX -= w.spd * 0.38;
        if (w.worldX + w.len < CAM.x - 80)
            w.worldX = CAM.x + W + Math.random() * W;
    });

    ptcls = ptcls.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.13; p.life--; return p.life>0; });
    msgs   = msgs.filter(m  => { m.y-=0.6;  m.life--; return m.life>0; });
    if (P.landCd > 0)      P.landCd--;
    if (P.comboWindow > 0) P.comboWindow--;
    if (P.floatFrames > 0) P.floatFrames--;
    if (resultCard && --resultCard.life <= 0) {
        document.getElementById('result-card').classList.remove('show');
        document.getElementById('result-card').classList.add('hide');
        resultCard = null;
    }
}

function posMult(angle) {
    const d = angle - (-65);
    return Math.max(0.12, Math.exp(-(d*d)/(2*58*58)));
}

function updateKite(wind) {
    if (!K.looping) {
        if (keys['ArrowLeft'])  K.targetAngle = Math.max(-176, K.targetAngle - 1.7);
        if (keys['ArrowRight']) K.targetAngle = Math.min( -4,  K.targetAngle + 1.7);
        if (keys['ArrowUp'])    K.targetAngle = Math.max(-176, K.targetAngle - 1.0);
        if (keys['ArrowDown'])  K.targetAngle = Math.min( -4,  K.targetAngle + 1.0);

        if (keys['KeyQ'] && !P.onWater && !K.looping && !P.loopDone && P.airTime > 5) {
            K.looping = true; K.loopTimer = 0;
            K.loopBase = K.angle;
            triggerKiteLoop();
        }
    }

    K.prevPrevAngle = K.prevAngle;
    K.prevAngle     = K.angle;

    if (K.looping) {
        K.loopTimer++;
        K.angle = K.loopBase + Math.sin(K.loopTimer / 45 * Math.PI * 2) * 90;
        if (K.loopTimer >= 45) {
            K.looping = false; K.loopTimer = 0;
            K.angle = Math.min(-35, K.loopBase);
            K.targetAngle = Math.min(-35, K.loopBase);
        }
    } else {
        K.angle += (K.targetAngle - K.angle) * 0.065;
    }

    // figure-8 パワーサージ
    const vel     = K.angle     - K.prevAngle;
    const prevVel = K.prevAngle - K.prevPrevAngle;
    if (vel * prevVel < -0.02 && posMult(K.angle) > 0.45 && !K.looping) {
        const speed = Math.abs(prevVel);
        const surge = Math.min(7, speed * 5.5);
        K.swingPower = Math.max(K.swingPower, surge);
        K.swingFlash = 12;
    }
    K.swingPower = Math.max(0, K.swingPower - 0.12);
    if (K.swingFlash > 0) K.swingFlash--;

    // 風窓チェック
    const downwindPush = P.vx * P.dir * 0.12;
    if (!K.looping) K.angle += downwindPush;

    if (K.angle > WIND_EDGE_COLLAPSE) {
        K.edgeState = 'collapse';
        K.shakeAmt  = Math.min(8, K.shakeAmt + 0.5);
        K.angle += (0 - K.angle) * 0.04;
        K.targetAngle = Math.min(K.targetAngle, WIND_EDGE_WARN);
    } else if (K.angle > WIND_EDGE_WARN) {
        K.edgeState = 'warn';
        K.shakeAmt  = Math.min(4, K.shakeAmt + 0.3);
    } else {
        K.edgeState = 'ok';
        K.shakeAmt  = Math.max(0, K.shakeAmt - 0.4);
    }

    const rad = K.angle * Math.PI / 180;
    const shakeX = K.shakeAmt * (Math.random() - 0.5) * 2;
    const shakeY = K.shakeAmt * (Math.random() - 0.5) * 2;
    K.x = P.x + Math.cos(rad) * LINE_LEN + shakeX;
    K.y = P.y + Math.sin(rad) * LINE_LEN - 10 + shakeY;

    const steerSpd   = Math.abs(K.angle - K.prevAngle);
    const steerBonus = Math.min(2.0, steerSpd * 1.2);
    let basePow = wind * posMult(K.angle) + steerBonus + K.swingPower;
    if (K.looping) basePow *= (1.5 + posMult(K.angle) * 1.8);

    if (K.edgeState === 'collapse') {
        basePow *= Math.max(0, (WIND_EDGE_COLLAPSE - K.angle) / 5);
    } else if (K.edgeState === 'warn') {
        basePow *= 0.5 + 0.5 * ((WIND_EDGE_WARN - K.angle) / (WIND_EDGE_WARN - WIND_EDGE_COLLAPSE));
    }
    K.power = basePow;
}

function updatePlayer() {
    const dx = K.x - P.x, dy = K.y - P.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const pullX = (dx/dist) * K.power * 0.072;
    const pullY = (dy/dist) * K.power * 0.072;

    if (P.onWater) {
        P.vx += pullX * 0.78;
        P.vx  = Math.max(-13, Math.min(13, P.vx));
        P.vx *= 0.958;
        if (Math.abs(P.vx) > 0.5) P.dir = P.vx > 0 ? 1 : -1;
        P.x += P.vx; P.y = WATER_Y; P.vy = 0; P.rot = 0; P.trickRot = 0;

        if (Math.abs(P.vx) > 4.5 && Math.random() < 0.22)
            splash(P.x - P.vx*2.5, WATER_Y, 2);

        if (keys['Space'] && P.landCd === 0 && Math.abs(P.vx) > 2 && K.power > 2) {
            const popStr = Math.min(5.5, Math.abs(P.vx)*0.28 + K.power*0.25 + 1.0);
            const kiteRad = K.angle * Math.PI / 180;
            const uplift  = Math.max(0, -Math.sin(kiteRad));
            P.vy  = -(popStr * (0.35 + 0.65 * uplift));
            P.vx += P.dir * popStr * (1 - uplift) * 0.5;
            P.onWater = false;
            P.airTime = 0; P.peakH = 0; P.jumpX = P.x;
            P.trickScore = 0; P.tricks.clear(); P.trickRot = 0; P.rot = 0;
            P.loopDone = false; P.spinDone = false;
            P.comboWindow = 0; P.floatFrames = 0; P.boostVx = 0;
            jumpCount++;
            splash(P.x, WATER_Y, 32);

            if (uplift > 0.85) {
                addMsg('↑ BIG AIR!', P.x, WATER_Y - 60, '#FFD700', 18, 55);
            } else if (uplift < 0.45) {
                addMsg('→ POP!', P.x, WATER_Y - 60, '#00FF88', 16, 45);
            }
        }

    } else {
        P.airTime++;

        // トリック回転: 一定速度で trickRot を消費
        if (P.trickRot !== 0) {
            const step = P.trickRot > 0
                ? Math.min( TRICK_ROT_SPEED,  P.trickRot)
                : Math.max(-TRICK_ROT_SPEED,  P.trickRot);
            P.rot      += step;
            P.trickRot -= step;
            if (Math.abs(P.trickRot) < 0.5) P.trickRot = 0;
        }

        // Xキー: トリック回転キャンセル
        if (keys['KeyX'] && P.trickRot !== 0) P.trickRot = 0;

        P.vx += pullX * 0.28;
        P.vx *= 0.982;
        const grav = P.floatFrames > 0 ? GRAVITY * 0.35 : GRAVITY;
        P.vy += pullY * 0.28 + grav;

        // ゼニス（真上）で降下中 → 落下速度を減衰
        if (P.vy > 0) {
            const zenithFactor = Math.max(0, 1 - Math.abs(K.angle + 90) / 35);
            P.vy *= (1 - zenithFactor * 0.06);
        }

        if (P.boostVx !== 0) {
            P.vx += P.boostVx * 0.04;
            P.boostVx *= 0.92;
            if (Math.abs(P.boostVx) < 0.1) P.boostVx = 0;
        }

        P.vx = Math.max(-15, Math.min(15, P.vx));
        P.vy = Math.max(-22, Math.min(16, P.vy));
        P.x += P.vx; P.y += P.vy;

        P.peakH = Math.max(P.peakH, WATER_Y - P.y);

        if (P.airTime > 8 && WATER_Y - P.y > 5) {
            TRICKS.forEach(t => {
                if (keys[t.code] && !P.tricks.has(t.name)) {
                    P.tricks.add(t.name);
                    P.trickScore += t.pts;
                    burst(P.x, P.y, t.col);

                    if (t.rotDir !== 0) {
                        P.trickRot = P.dir * t.rotDir * 360;
                        P.rot = 0;
                        if (t.name === 'FrontRoll' && !P.spinDone) triggerSpin();
                        else addMsg(t.name + '!', P.x, P.y - 38, t.col, 20, 65);
                    } else {
                        addMsg(t.name + '!', P.x, P.y - 38, t.col, 20, 65);
                    }
                }
            });
        }

        if (P.y >= WATER_Y && P.vy > 0) checkLanding();
    }
}

function checkLanding() {
    const tooFast = P.vy > CRASH_VY;
    const spinning = Math.abs(P.trickRot) > 45;

    if (tooFast || spinning) {
        const reasons = [];
        if (tooFast)  reasons.push('HARD IMPACT');
        if (spinning) reasons.push('STILL SPINNING');
        crash(reasons.join(' + '));
    } else {
        land();
    }
}

function crash(reason) {
    P.crashing  = true;
    P.crashTimer = 0;
    P.y   = WATER_Y;
    P.vy  = -3;
    P.vx *= 0.2;
    P.crashRot = P.dir * 18;

    splash(P.x, WATER_Y, 80);
    for (let i = 0; i < 3; i++)
        setTimeout(() => splash(P.x + (Math.random()-.5)*40, WATER_Y, 20), i*150);

    addMsg('WIPEOUT!', P.x, WATER_Y - 70, '#FF4444', 30, 130);
    addMsg(reason, P.x, WATER_Y - 100, '#FF8888', 14, 110);

    const pts = Math.floor(P.peakH * 0.12 + P.airTime * 0.08);
    score += pts;

    showResultCard({
        heightM:  Math.floor(P.peakH * PX_TO_M),
        distM:    Math.floor(Math.abs(P.x - P.jumpX) * PX_TO_M * 0.6),
        airtimeS: (P.airTime / FPS).toFixed(1),
        pts, tricks: [], crashed: true, reason,
        life: 210, maxLife: 210,
    });
}

function updateCrash() {
    P.crashTimer++;
    P.rot += P.crashRot;
    P.crashRot *= 0.88;
    P.vx    *= 0.92;
    P.y      = WATER_Y;

    if (P.crashTimer > 90) {
        P.crashing = false; P.crashTimer = 0;
        P.rot = 0; P.trickRot = 0; P.crashRot = 0;
        P.onWater = true;
        P.airTime = 0; P.peakH = 0;
        P.tricks.clear(); P.trickScore = 0;
        P.landCd = 120;
    }
}

function land() {
    const heightM  = Math.floor(P.peakH * PX_TO_M);
    const distM    = Math.floor(Math.abs(P.x - P.jumpX) * PX_TO_M * 0.6);
    const airtimeS = (P.airTime / FPS).toFixed(1);
    const pts      = Math.floor(P.peakH * 0.35 + P.airTime * 0.18 + P.trickScore);
    score += pts; if (score > best) best = score;
    // 高さログに追加
    if (heightM > 0) {
        heightLog.push(heightM);
        heightLog.sort((a,b)=>b-a);
        heightLog = heightLog.slice(0,5);
    }

    showResultCard({
        heightM, distM, airtimeS, pts,
        tricks: Array.from(P.tricks),
        crashed: false,
        life: 180, maxLife: 180,
    });

    splash(P.x, WATER_Y, 40);
    P.y = WATER_Y; P.vy = 0; P.vx *= 0.62;
    P.onWater = true;
    P.airTime = 0; P.peakH = 0; P.tricks.clear(); P.trickScore = 0;
    P.rot = 0; P.trickRot = 0; P.landCd = 50;
    P.loopDone = false; P.spinDone = false; P.boostVx = 0;
}

// ── トリック ──
function triggerKiteLoop() {
    const early = P.airTime < 22;
    if (early) { P.vy -= 2.0; addMsg('KITE LOOP! ↑', P.x, P.y-50, '#00BFFF', 22, 75); }
    else        { P.boostVx = P.dir*3; addMsg('KITE LOOP! →', P.x, P.y-50, '#00BFFF', 22, 75); }
    burst(P.x, P.y, '#00BFFF');
    P.trickScore += 80; P.loopDone = true;
    if (P.comboWindow > 0 || P.spinDone) triggerCombo();
    else P.comboWindow = 40;
}
function triggerSpin() {
    const early = P.airTime < 22;
    if (early) { P.vy -= 0.8; P.floatFrames = 40; addMsg('ROLL ↑ FLOAT!', P.x, P.y-50, '#00CFFF', 20, 70); }
    else        { P.boostVx = P.dir*2; addMsg('ROLL → SEND IT!', P.x, P.y-50, '#00CFFF', 20, 70); }
    P.spinDone = true;
    if (P.comboWindow > 0 || P.loopDone) triggerCombo();
    else P.comboWindow = 40;
}
function triggerCombo() {
    P.vy -= 1.0; P.boostVx += P.dir*1.5; P.trickScore += 100;
    burst(P.x, P.y-20, '#FFD700'); burst(P.x, P.y+10, '#FF6B6B');
    addMsg('🔥 COMBO!', P.x, P.y-80, '#FFD700', 26, 100);
    P.comboWindow = 0;
}

// ── パーティクル ──
function splash(x,y,n){
    for(let i=0;i<n;i++)
        ptcls.push({x,y,vx:(Math.random()-.5)*5.5,vy:-Math.random()*6,
            life:22+Math.random()*28,maxLife:50,col:'rgba(160,220,255,'});
}
function burst(x,y,hex){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    for(let i=0;i<20;i++){const a=(Math.PI*2*i)/20;
        ptcls.push({x,y,vx:Math.cos(a)*(2.5+Math.random()*2),vy:Math.sin(a)*(2.5+Math.random()*2),
            life:38,maxLife:38,col:`rgba(${r},${g},${b},`});}
}
function addMsg(text,x,y,color='#fff',size=18,life=70){
    msgs.push({text,x,y,color,size,life,maxLife:life});
}

function showResultCard(rc) {
    resultCard = rc;
    const el    = document.getElementById('result-card');
    const isOk  = !rc.crashed;
    document.getElementById('card-title').textContent  = isOk ? 'LANDED!' : 'WIPEOUT!';
    document.getElementById('card-title').className    = isOk ? 'ok' : 'crash';
    document.getElementById('card-reason').textContent = rc.reason || '';
    document.getElementById('cs-h').textContent  = rc.heightM;
    document.getElementById('cs-d').textContent  = rc.distM;
    document.getElementById('cs-t').textContent  = rc.airtimeS;
    document.getElementById('card-tricks').textContent = rc.tricks.join(' / ');
    document.getElementById('card-pts').textContent    = '+' + rc.pts + ' pts';
    document.getElementById('card-best').textContent   = (!rc.crashed && score === best && best > 0) ? '★ NEW BEST!' : '';
    el.classList.remove('hide');
    // アニメーションリセット
    el.classList.remove('show');
    void el.offsetWidth; // reflow
    el.classList.add('show');
}

function updateUI() {
    const wind = (WIND.base + Math.sin(frame * 0.009) * 1.5).toFixed(1);
    const spd  = Math.abs(P.vx).toFixed(1);

    document.getElementById('ui-score').textContent = score;
    document.getElementById('ui-best').textContent  = 'BEST: ' + best;
    document.getElementById('ui-jumps').textContent = 'JUMPS: ' + jumpCount;
    document.getElementById('ui-wind').textContent  = wind + ' m/s →';
    document.getElementById('ui-speed').textContent = 'SPD: ' + spd;
    // 高さログ
    const logEl = document.getElementById('log-list');
    logEl.textContent = heightLog.length
        ? heightLog.map((h,i)=>`${i+1}. ${h} m`).join('\n')
        : '--';

    // パワーバー
    const pct  = Math.min(100, K.power / 10 * 100);
    const fill = document.getElementById('power-fill');
    fill.style.width = pct + '%';
    if (K.looping) fill.classList.add('loop');
    else           fill.classList.remove('loop');

    // 飛行中スタッツ
    const fs = document.getElementById('flight-stats');
    if (!P.onWater || P.crashing) {
        fs.classList.add('show');
        const hm = P.crashing ? Math.floor(P.peakH*PX_TO_M)
                               : Math.max(0, Math.floor((WATER_Y-P.y)*PX_TO_M));
        document.getElementById('fs-h').textContent = hm;
        document.getElementById('fs-a').textContent = (P.airTime/FPS).toFixed(1);
    } else {
        fs.classList.remove('show');
    }

    // 風窓警告
    const ww = document.getElementById('wind-warn');
    if (K.edgeState !== 'ok') {
        ww.classList.add('show');
        ww.className = 'show ' + K.edgeState;
        ww.textContent = K.edgeState === 'collapse'
            ? '⚠ KITE EDGE – POWER LOST!'
            : '⚠ KITE EDGE – STEER BACK!';
    } else {
        ww.classList.remove('show');
    }

    // スマホ: 空中でトリックボタン表示
    if (IS_MOBILE) {
        const tl = document.getElementById('touch-l');
        if (!P.onWater && P.airTime > 8) tl.classList.add('show');
        else                               tl.classList.remove('show');
    }

    // ヒント非表示
    if (jumpCount > 0 || frame > 360) {
        document.getElementById('hint').classList.add('hide');
    }
}

// ============================================================
//  DRAW (Canvas: ゲーム本体のみ)
// ============================================================
function draw(){
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawIslands();
    ctx.save(); ctx.translate(-CAM.x,-CAM.y);
    drawWater(); drawWaves(); drawParticles();
    drawKiteLine(); drawKite(); drawPlayer(); drawWorldMsgs();
    ctx.restore();
}

function drawSky(){
    const waterScrY = Math.max(0, sy(WATER_Y));
    if (waterScrY > 0) {
        const g = ctx.createLinearGradient(0,0,0,waterScrY);
        g.addColorStop(0,'#1a6abf'); g.addColorStop(.5,'#3a9bd5'); g.addColorStop(1,'#7ecef4');
        ctx.fillStyle = g; ctx.fillRect(0,0,W,waterScrY);
    }
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    for(let i=0;i<6;i++){
        let cx=((i*W*.48-CAM.x*.10)%(W*1.2)); if(cx<-150) cx+=W*1.2;
        cloud(cx, 35+i*22-CAM.y*.04, 45+i*10);
    }
}
function cloud(x,y,s){
    ctx.beginPath();
    ctx.arc(x,y,s*.50,0,Math.PI*2); ctx.arc(x+s*.45,y-s*.10,s*.38,0,Math.PI*2);
    ctx.arc(x+s*.85,y,s*.32,0,Math.PI*2); ctx.fill();
}

function drawIslands(){
    // プレイヤー位置で周期的に繰り返す島（画面幅の3倍周期）
    const ISLS=[
        {phase:0.05, w:220,h:70, col:'#2a7a3b'},
        {phase:0.28, w:310,h:95, col:'#33934a'},
        {phase:0.50, w:150,h:50, col:'#257234'},
        {phase:0.70, w:260,h:80, col:'#3aaa52'},
        {phase:0.88, w:110,h:38, col:'#1e6630'},
    ];
    const wy      = sy(WATER_Y);
    const period  = W * 3.5;
    const offset  = P.x * 0.12; // プレイヤー速度の12%でゆっくり流れる

    ISLS.forEach(isl=>{
        const raw = ((isl.phase * period - offset) % period + period) % period;
        const cx  = raw - W * 0.15; // 画面左端より少し外から開始
        if (cx < -isl.w - 10 || cx > W + isl.w + 10) return;

        // 島本体
        ctx.fillStyle = isl.col;
        ctx.beginPath();
        ctx.moveTo(cx - isl.w/2, wy);
        ctx.bezierCurveTo(cx-isl.w*.38,wy-isl.h*1.3, cx+isl.w*.38,wy-isl.h*1.3, cx+isl.w/2, wy);
        ctx.closePath(); ctx.fill();
        // 砂浜
        ctx.fillStyle='#e8c87a';
        ctx.beginPath();
        ctx.ellipse(cx, wy, isl.w*.38, isl.h*.16, 0, Math.PI, 0); ctx.fill();
        // ヤシ
        palm(cx - isl.w*.08, wy - isl.h*.88, isl.h*.65);
        if (isl.w > 180) palm(cx + isl.w*.16, wy - isl.h*.72, isl.h*.52);
    });
}
function palm(x,y,h){
    ctx.strokeStyle='#7a5522'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,y+h);
    ctx.quadraticCurveTo(x+h*.18,y+h*.5,x,y); ctx.stroke();
    const lvs=[[-1,-.4],[1,-.4],[0,-1],[.6,-.7],[-.6,-.7]];
    ctx.lineWidth=2;
    lvs.forEach(([dx,dy])=>{
        ctx.strokeStyle=`hsl(${110+dx*10},65%,${30+dy*10}%)`;
        ctx.beginPath(); ctx.moveTo(x,y);
        ctx.quadraticCurveTo(x+dx*h*.3,y+dy*h*.35,x+dx*h*.65,y+dy*h*.52); ctx.stroke();
    });
}

function drawWater(){
    const left = CAM.x-200;
    const g = ctx.createLinearGradient(0,WATER_Y,0,WATER_Y+H);
    g.addColorStop(0,'#12c4c4'); g.addColorStop(.25,'#0fa0aa'); g.addColorStop(1,'#07607a');
    ctx.fillStyle=g; ctx.fillRect(left,WATER_Y,W+400,H+300);
    ctx.fillStyle='rgba(255,255,255,0.09)';
    for(let i=0;i<8;i++){const shx=left+((frame*1.3+i*138)%(W+400)); ctx.fillRect(shx,WATER_Y+5,55,2);}
}
function drawWaves(){
    WAVES.forEach(w=>{
        const wy = WATER_Y + Math.sin(w.ph + frame*.022) * w.amp * .22;
        const crest = wy - w.amp * .85;
        // 波の塗りグラデーション
        const g = ctx.createLinearGradient(0, crest, 0, wy + 8);
        g.addColorStop(0,   'rgba(230,250,255,0.75)');
        g.addColorStop(0.4, 'rgba(160,225,245,0.35)');
        g.addColorStop(1,   'rgba(120,200,230,0.0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(w.worldX, wy);
        ctx.bezierCurveTo(w.worldX+w.len*.25, crest, w.worldX+w.len*.75, crest, w.worldX+w.len, wy);
        ctx.lineTo(w.worldX+w.len, wy+8);
        ctx.lineTo(w.worldX, wy+8);
        ctx.closePath();
        ctx.fill();
        // 白いクレスト（波頭）
        ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(w.worldX + w.len*.15, crest + 3);
        ctx.bezierCurveTo(w.worldX+w.len*.38,crest, w.worldX+w.len*.62,crest, w.worldX+w.len*.85,crest+3);
        ctx.stroke();
    });
}
function drawParticles(){
    ptcls.forEach(p=>{
        ctx.fillStyle=p.col+(p.life/p.maxLife).toFixed(2)+')';
        ctx.beginPath(); ctx.arc(p.x,p.y,2.2,0,Math.PI*2); ctx.fill();
    });
}
function drawKiteLine(){
    const col = K.edgeState==='collapse' ? '#FF4444' :
                K.edgeState==='warn'     ? '#FFD700' : 'rgba(220,220,220,0.72)';
    if (K.swingFlash > 0) {
        ctx.shadowColor='#fff'; ctx.shadowBlur = K.swingFlash * 2.5;
    }
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(P.x, P.y-20); ctx.lineTo(K.x, K.y); ctx.stroke();
    ctx.shadowBlur=0;
}
function drawKite(){
    ctx.save(); ctx.translate(K.x, K.y);

    const collapsed = K.edgeState === 'collapse';
    const warned    = K.edgeState === 'warn';
    if (K.looping) { ctx.shadowColor='#00BFFF'; ctx.shadowBlur=22; }

    // カイトを線方向に垂直に向ける
    const kRad = (K.angle + 90) * Math.PI / 180;
    ctx.rotate(kRad);

    const W2 = 34, H2 = 14; // 翼幅・高さ

    // 翼パネル色
    const cL = collapsed ? '#555' : warned ? '#CC9900' : K.looping ? '#0099EE' : '#EE3300';
    const cR = collapsed ? '#444' : warned ? '#FFD700' : K.looping ? '#00CCFF' : '#FFFFFF';

    // 左翼
    ctx.fillStyle = cL;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-W2*.3,-H2, -W2*.85,-H2*.5, -W2, H2*.5);
    ctx.bezierCurveTo(-W2*.7, H2*.9, -W2*.25, H2*.8, 0, H2*.4);
    ctx.closePath(); ctx.fill();

    // 右翼
    ctx.fillStyle = cR;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(W2*.3,-H2, W2*.85,-H2*.5, W2, H2*.5);
    ctx.bezierCurveTo(W2*.7, H2*.9, W2*.25, H2*.8, 0, H2*.4);
    ctx.closePath(); ctx.fill();

    // センターパネル（差し色）
    ctx.fillStyle = collapsed ? '#333' : warned ? '#886600' : K.looping ? '#0055BB' : '#CC1100';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-W2*.18, -H2*.7);
    ctx.lineTo(0, H2*.4);
    ctx.lineTo(W2*.18, -H2*.7);
    ctx.closePath(); ctx.fill();

    // リーディングエッジ（太い輝くアーク）
    const leG = ctx.createLinearGradient(-W2,0,W2,0);
    leG.addColorStop(0,'rgba(255,255,255,0.3)');
    leG.addColorStop(.5,'rgba(255,255,255,0.9)');
    leG.addColorStop(1,'rgba(255,255,255,0.3)');
    ctx.strokeStyle = leG; ctx.lineWidth = 5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-W2, H2*.5);
    ctx.bezierCurveTo(-W2*.85,-H2*.5, -W2*.3,-H2, 0, 0);
    ctx.bezierCurveTo(W2*.3,-H2, W2*.85,-H2*.5, W2, H2*.5);
    ctx.stroke();

    // ウィングチップ
    [-W2, W2].forEach(tx=>{
        ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(tx, H2*.5, 3.5, 0, Math.PI*2); ctx.fill();
    });

    ctx.shadowBlur=0;
    ctx.restore();
}

function drawPlayer(){
    ctx.save(); ctx.translate(P.x, P.y);
    ctx.rotate(P.rot * Math.PI / 180);

    const flash = P.crashing && (P.crashTimer%8<4);
    const skin  = flash ? '#FF6666' : '#f5c59c';
    const F = (c) => { ctx.fillStyle = flash ? '#FF4444' : c; };

    // ボード
    ctx.fillStyle='#2196F3';
    rrect(-22,-6,44,9,3); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1; ctx.stroke();

    // 脚
    ctx.fillStyle=skin;
    ctx.fillRect(-8,-22,5,16); ctx.fillRect(4,-22,5,16);

    // 赤い短パン
    F('#d42020');
    ctx.fillRect(-10,-30,20,12);
    ctx.fillStyle=flash?'#FF6666':'rgba(255,255,255,0.25)';
    ctx.fillRect(-10,-30,20,2);

    // 黒インパクトベスト
    F('#1a1a1a');
    ctx.fillRect(-8,-42,16,14);
    ctx.fillStyle=flash?'#FF6666':'#333';
    ctx.fillRect(-8,-42,3,14); ctx.fillRect(5,-42,3,14);
    ctx.fillStyle=flash?'#FF6666':'rgba(180,180,180,0.5)';
    ctx.fillRect(-1,-41,2,12);

    // 首
    ctx.fillStyle=skin;
    ctx.fillRect(-3,-45,6,5);

    // 頭
    ctx.fillStyle=skin;
    ctx.beginPath(); ctx.arc(0,-48,7,0,Math.PI*2); ctx.fill();

    // 黄色ヘルメット
    F('#FFD700');
    ctx.beginPath(); ctx.arc(0,-48,8.5,Math.PI,0); ctx.fill();
    ctx.fillRect(-10,-48,20,3);
    ctx.fillStyle=flash?'#FF4444':'#e6a800';
    ctx.fillRect(-10,-49,20,2);

    // バイザー
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(-5,-51,10,4);

    if(P.floatFrames>0){
        const a=(P.floatFrames/50)*.4;
        ctx.fillStyle=`rgba(0,191,255,${a.toFixed(2)})`;
        ctx.beginPath(); ctx.arc(0,-25,30,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawWorldMsgs(){
    msgs.forEach(m=>{
        const a=Math.min(1,m.life/28);
        ctx.save(); ctx.globalAlpha=a;
        ctx.fillStyle=m.color; ctx.font=`bold ${m.size}px Arial`;
        ctx.textAlign='center'; ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=5;
        ctx.fillText(m.text,m.x,m.y); ctx.restore();
    });
}

function rrect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ============================================================
//  メインループ
// ============================================================
(function loop(){ update(); draw(); updateUI(); requestAnimationFrame(loop); })();
</script>
